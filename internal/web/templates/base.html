<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  {{block "meta" .}}{{end}}
  <title>{{block "title" .}}Default Title{{end}}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body>
  <nav>
    {{if .IsLoggedIn}}
    <a href="/">Home</a> | <a href="/upload">Upload</a> | <a href="/logout">Logout</a>
    {{else}}
    <a href="/">Home</a> | <a href="/login">Login</a>
    {{end}}
  </nav>
  {{block "content" .}}{{end}}

  {{if .Token}}
  <textarea disabled rows="8" cols="60">{{.Token}}</textarea>
  {{end}}
  
  <!-- <footer>© 2026 My Awesome Go App</footer> -->
</body>
</html>
