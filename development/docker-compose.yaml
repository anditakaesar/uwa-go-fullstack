services:
  backendpostgres:
    image: postgres:18-alpine
    container_name: pg18-uwafullstack
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_ROOT_PASSWORD: password
    env_file:
      - .env
    ports:
      - "${EXPOSEPORT:-5432}:5432"
    volumes:
      - data-volume-uwafull:/var/lib/postgresql/data

volumes:
  data-volume-uwafull:
    driver: local