services:
  backendpostgres:
    image: postgres:18-alpine
    container_name: pg18-uwafullstack
    environment:
      POSTGRES_DB: backend_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_ROOT_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - data-volume:/var/lib/postgresql/data

volumes:
  data-volume:
    driver: local